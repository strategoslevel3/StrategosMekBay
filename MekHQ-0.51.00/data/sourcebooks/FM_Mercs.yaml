description: 'For over forty centuries, mercenaries have plied their trade and been instrumental in toppling empires or holding the tides of war at bay. And as mankind expanded to the stars, soldiers of fortune rose to new heights of power. Business is booming, yet along with those riches comes a dangerous life and the scorn of many who see only filthy lucrewarriors. It’s perilous work, but as long as you keep your ’Mech intact and your bottom line balanced, the universe is yours!
  Details some of the most renowned mercenary units, examining combat commands, histories, tactics, unit crests, paint schemed, and notable personnel
  Includes special rules for unique character abilities, faction-specific rules, force building options, and a miniTechnical Readout.
  For use with BattleTech and Alpha Strike.'
